<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TradeVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md w-full border border-gray-700">
            <h2 class="text-2xl font-bold mb-4 text-center">Reset Password</h2>
            <div id="formContainer">
                <input type="password" id="newPassword" placeholder="New password" class="w-full bg-gray-700 border-gray-600 rounded-lg p-3 mb-3 text-white">
                <input type="password" id="confirmPassword" placeholder="Confirm password" class="w-full bg-gray-700 border-gray-600 rounded-lg p-3 mb-4 text-white">
                <button onclick="resetPassword()" class="w-full bg-purple-600 hover:bg-purple-700 rounded-lg p-3 font-semibold transition">Reset Password</button>
            </div>
            <div id="message" class="text-center mt-4"></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const API_URL = '/api';

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || !confirmPassword) {
                alert('Please enter password');
                return;
            }
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            const res = await fetch(`${API_URL}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('formContainer').innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-check-circle text-4xl text-green-500 mb-3"></i>
                        <p class="text-green-500">Password reset successful!</p>
                        <a href="/dashboard.html" class="mt-4 inline-block bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg">Login</a>
                    </div>
                `;
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
